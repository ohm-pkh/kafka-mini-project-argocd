apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: reflector
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "-3"

spec:
  project: default

  source:
    repoURL: https://github.com/ohm-pkh/kafka-mini-project-argocd.git
    targetRevision: main
    path: applications/infrastructure/reflector

  destination:
    server: https://kubernetes.default.svc
    namespace: reflector

  syncPolicy:
    automated:
      prune: true
      selfHeal: true