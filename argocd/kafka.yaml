apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kafka
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "-2"

spec:
  project: default

  source:
    repoURL: https://github.com/ophkmh/kafka-mini-project-argocd.git
    targetRevision: main
    path: applications/infrastructure/kafka

  destination:
    server: https://kubernetes.default.svc
    namespace: kafka

  syncPolicy:
    automated:
      prune: true
      selfHeal: true