apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: image-service
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: default

  source:
    repoURL: https://github.com/ohm-pkh/kafka-mini-project-argocd.git
    targetRevision: main
    path: applications/apps/image-service

  destination:
    server: https://kubernetes.default.svc
    namespace: image-service

  syncPolicy:
    automated:
      prune: true
      selfHeal: true