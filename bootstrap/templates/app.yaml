apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: bootstrap-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ohm-pkh/kafka-mini-project-argocd.git
    targetRevision: main
    path: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true