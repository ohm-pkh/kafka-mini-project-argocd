{{- $svc := index .Values "image-service" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-service
  labels:
    app: image-service
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ $svc.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: image-service
  template:
    metadata:
      labels:
        app: image-service
    spec:
      containers:
        - name: image-service
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: {{ $svc.env.PORT }}
              protocol: TCP

          env:
            {{- range $key, $value := $svc.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-postgresql
                  key: postgres-password
            - name: STORAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-sealed
                  key: rootUser
            - name: STORAGE_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-sealed
                  key: rootPassword

          envFrom:
            {{- range $svc.secretName }}
            - secretRef:
                name: {{ . }}
            {{- end }}

          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.env.PORT }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: {{ $svc.env.PORT }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi