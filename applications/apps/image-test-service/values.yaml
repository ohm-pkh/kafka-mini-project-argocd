image-test-service:
  replicaCount: 3
  image:
    repository: ophkmh/kafka-mini-project-img-test-service
    tag: "v0.3"

  env:
    DB_HOST: "postgres-postgresql.database.svc.cluster.local"
    DB_USER: postgres
    DB_PORT: 5432
    DB_NAME: minikafka
    STORAGE_ENDPOINT: "http://minio.minio.svc.cluster.local:9000"
    STORAGE_BUCKET: mini-kafka
    KAFKA_BROKERS: "kafka.kafka.svc.cluster.local:9092"
    RETRY_TEST: 3
    WAIT_TIME_SEC: 1
    PORT: 8080
    

  secretName: 
    - postgres-postgresql
    - minio-sealed